services:
  database:
    image: postgres:15
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust

  conjur:
    image: cyberark/conjur
    command: server
    environment:
      DATABASE_URL: postgres://postgres@database/postgres
      CONJUR_DATA_KEY: "${CONJUR_DATA_KEY}"
      CONJUR_AUTHENTICATORS: "authn,authn-iam/prod"
    depends_on:
      - database
    ports:
      - "8080:80"
